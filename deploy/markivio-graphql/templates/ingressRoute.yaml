{{- if .Values.ingressRoute.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "deploy.fullname" . }}-ingress-route
  labels:
    {{- include "deploy.labels" . | nindent 4 }}
  {{- with .Values.ingressRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: Host(`{{ .Values.ingressRoute.domain }}`)
    services:
      - name: {{ include "deploy.fullname" . }}-svc
        port: {{ .Values.service.port }}
  tls:
    certResolver: le

{{- end }}
