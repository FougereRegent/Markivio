apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingress-route
spec:
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: Host(`{{ .Values.ingressRoute.host }}`)
    services:
      - name: {{ .Release.Name }}-service
        port: {{ .Values.service.port }}
  tls:
    certResolver: le

