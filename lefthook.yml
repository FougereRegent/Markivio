commit-msg:
  commands:
    "lint commit message":
      run: pnpm commitlint --edit {1}
pre-push:

  parallel: true
  commands:
    backend:
      root: ./backend/api/
      glob: "**/*.cs"
      run: |
        dotnet build Markivio.sln
        dotnet test Markivio.UnitTests/Markivio.UnitTests.csproj

    frontend:
      root: ./frontend/markivio-frontend/
      glob: "**/{*.js,*.ts,*.vue}"
      run: |
        pnpm build
        pnpm test:unit
